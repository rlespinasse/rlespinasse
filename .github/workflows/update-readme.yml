name: Update README

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-readme.yml'
      - '.github/scripts/update-readme/**'
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 06:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: .github/scripts/update-readme/go.mod

      - name: Install ghat
        shell: bash
        run: |
          go install github.com/rlespinasse/github-actions-toolbox@latest
          ln -s $(go env GOPATH)/bin/github-actions-toolbox $(go env GOPATH)/bin/ghat

      - name: Update README sections
        shell: bash
        working-directory: .github/scripts/update-readme
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run . ../../../README.md

      - name: Commit and push if changed
        shell: bash
        run: |
          git diff --quiet README.md && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update README project lists"
          git push
