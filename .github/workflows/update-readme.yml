name: Update README

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-readme.yml'
      - '.github/scripts/update-readme/**'
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 06:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: .github/scripts/update-readme/go.mod

      - name: Install ghat
        run: |
          go install github.com/rlespinasse/github-actions-toolbox@latest
          ln -s $(go env GOPATH)/bin/github-actions-toolbox $(go env GOPATH)/bin/ghat

      - name: Update README sections
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run ./.github/scripts/update-readme/

      - name: Commit and push if changed
        run: |
          git diff --quiet README.md && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update README project lists"
          git push
